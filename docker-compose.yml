services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resili-ai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - resili-ai

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resili-ai-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: resili_ai
      DB_USERNAME: resili
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - resili-ai

  database:
    image: mysql:8.0
    container_name: resili-ai-database
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: resili_ai
      MYSQL_USER: resili
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - resili-ai

  redis:
    image: redis:7-alpine
    container_name: resili-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - resili-ai

networks:
  resili-ai:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules:
  backend_vendor:
